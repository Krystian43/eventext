<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title data-i18n="page_title">Eventext v1.8.2 - Prezentuj tekst</title>
	<meta name="description" content="Prezentuj tekst godnie."/>
    <meta name="keywords" content="Krystian Jarecki, tekst, event, obrotowy, animacje, Torio Labs"/>
	<meta name="author" content="Krystian Jarecki"/>
	<meta name="og:title" content="Eventext v1.8.1 - Prezentuj tekst"/>
    <meta name="og:description" content="Prezentuj tekst godnie."/>
    <style>
        body{margin:0;background:#000;overflow:hidden;font-family: 'Segoe UI', sans-serif}
        #panel{position:fixed;top:10px;left:10px;padding:15px;background:rgba(15,15,15,0.92);color:#eee;
               border-radius:12px;border:1px solid #333; z-index:10;min-width:280px; max-height: 90vh; overflow-y: auto;
               box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(8px);}
        #panel.hidden{display:none}
        .top-controls{position:fixed;top:10px;right:10px;z-index:11;display:flex;gap:8px;}
        button{padding:10px 16px;border-radius:8px;background:#252525;color:#eee;border:1px solid #444;cursor:pointer;transition:0.2s}
        button:hover{background:#00ffff; color:#000; border-color:#00ffff}
        label{display:block;margin-top:10px;font-size: 10px;color:#00ffff;text-transform: uppercase;letter-spacing: 1.5px;font-weight:bold}
        input, select{width:100%;margin-top:5px;background:#050505;color:#fff;border:1px solid #333;padding:8px;border-radius:4px;box-sizing: border-box;}
        input[type="range"]{padding:0; accent-color: #00ffff;}
        h3{margin:0 0 15px 0; color:#fff; font-size:16px; text-align:center; border-bottom:1px solid #333; padding-bottom:10px}
        .hint{font-size: 10px; color: #666; font-weight: normal; text-transform: none; margin-top: 2px;}
    </style>

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/examples/jsm/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>

<div class="top-controls">
    <button onclick="toggleLanguage()" id="langBtn">🇬🇧 EN</button>
    <button id="fsBtn" data-i18n="btn_fullscreen">Pełny Ekran</button>
    <button id="togglePanel" data-i18n="btn_panel_hide">Ukryj Panel</button>
</div>

<div id="panel">
    <h3>EVENTEXT v1.8.1</h3>
    
    <label data-i18n="lbl_text_content">Treść tekstu:</label>
    <input id="textInput" value="EVENTEXT">

    <label data-i18n="lbl_material">Materiał:</label>
    <select id="materialInput">
        <option value="custom_metal" data-i18n="mat_custom_metal">★ Własny Metal (Wybierz kolor)</option>
        <option value="chrome" data-i18n="mat_chrome">Lustrzany Chrom</option>
        <option value="gold" data-i18n="mat_gold">Szczotkowane Złoto</option>
        <option value="wood" data-i18n="mat_wood">Słoje Drewna (Wybierz kolor)</option>
        <option value="plastic" data-i18n="mat_plastic">Błyszczący Plastik</option>
        <option value="neon" data-i18n="mat_neon">Neonowy Blask</option>
    </select>

    <label id="colorLabel" data-i18n="lbl_color">Kolor materiału:</label>
    <input id="colorInput" type="color" value="#00ffff">
    <div class="hint" id="colorHint" data-i18n="hint_color">* Kolor ignorowany dla Chromu i Złota</div>

    <label data-i18n="lbl_exposure">Jasność (Ekspozycja):</label>
    <input id="exposureInput" type="range" min="0.5" max="5" step="0.1" value="2.5">

    <label data-i18n="lbl_speed">Szybkość obrotu:</label>
    <input id="speedInput" type="range" min="0" max="0.05" step="0.001" value="0.01">

    <label data-i18n="lbl_size">Rozmiar:</label>
    <input id="sizeInput" type="range" min="0.5" max="5" step="0.1" value="2.2">
	
    <label data-i18n="lbl_thickness">Grubość:</label>
    <input id="depthInput" type="range" min="0.1" max="2" step="0.05" value="0.6">

    <button id="resetBtn" data-i18n="btn_reset" style="margin-top:20px; width:100%; background:blue; border-color:#500">Resetuj wszystko</button>
</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
import { TextGeometry } from "three/examples/jsm/geometries/TextGeometry.js";
import { FontLoader } from "three/examples/jsm/loaders/FontLoader.js";

let scene, camera, renderer, controls, textMesh, font;
const ids = ["textInput","sizeInput","depthInput","speedInput","colorInput","materialInput","exposureInput"];

// --- SŁOWNIK I18N ---
const translations = {
    pl: {
        page_title: "Eventext v1.8.2 - Prezentuj tekst",
        btn_fullscreen: "Pełny Ekran",
        btn_panel_hide: "Ukryj Panel",
        btn_panel_show: "Pokaż",
        lbl_text_content: "Treść tekstu:",
        lbl_material: "Materiał:",
        mat_custom_metal: "★ Własny Metal (Wybierz kolor)",
        mat_chrome: "Lustrzany Chrom",
        mat_gold: "Szczotkowane Złoto",
        mat_wood: "Słoje Drewna (Wybierz kolor)",
        mat_plastic: "Błyszczący Plastik",
        mat_neon: "Neonowy Blask",
        lbl_color: "Kolor materiału:",
        hint_color: "* Kolor ignorowany dla Chromu i Złota",
        lbl_exposure: "Jasność (Ekspozycja):",
        lbl_speed: "Szybkość obrotu:",
        lbl_size: "Rozmiar:",
        lbl_thickness: "Grubość:",
        btn_reset: "Resetuj wszystko"
    },
    en: {
        page_title: "Eventext v1.8.2 - Showcase text",
        btn_fullscreen: "Full screen",
        btn_panel_hide: "Hide Panel",
        btn_panel_show: "Show",
        lbl_text_content: "Text content:",
        lbl_material: "Material:",
        mat_custom_metal: "★ Custom Metal (choose color)",
        mat_chrome: "Reflective Chrome",
        mat_gold: "Gold",
        mat_wood: "Wood (choose color)",
        mat_plastic: "Plastic",
        mat_neon: "Neon (glowing text)",
        lbl_color: "Material color:",
        hint_color: "* Color is disabled for chrome and gold",
        lbl_exposure: "Brightness (exposure):",
        lbl_speed: "Rotation speed:",
        lbl_size: "Size:",
        lbl_thickness: "Thickness:",
        btn_reset: "Reset settings"
    }
};

window.setLanguage = function(lang) {
    document.documentElement.lang = lang;
    
    document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
            if (element.tagName === "TITLE") {
                document.title = translations[lang][key];
            } else {
                element.textContent = translations[lang][key];
            }
        }
    });

    const langBtn = document.getElementById('langBtn');
    if (langBtn) {
        langBtn.textContent = lang === 'pl' ? '🇬🇧 EN' : '🇵🇱 PL';
    }

    // Aktualizacja tekstu przycisku panelu w zależności od jego widoczności
    const p = document.getElementById("panel");
    const toggleBtn = document.getElementById("togglePanel");
    if (p && toggleBtn) {
        const isHidden = p.classList.contains("hidden");
        toggleBtn.textContent = isHidden ? translations[lang]["btn_panel_show"] : translations[lang]["btn_panel_hide"];
    }
}

window.toggleLanguage = function() {
    const currentLang = document.documentElement.lang === 'pl' ? 'pl' : 'en';
    const newLang = currentLang === 'pl' ? 'en' : 'pl';
    window.setLanguage(newLang);
    localStorage.setItem('eventext_lang', newLang);
}

function initLanguage() {
    if (window.location.search.includes("reset")) {
        localStorage.removeItem('eventext_lang');
    }
    const savedLang = localStorage.getItem('eventext_lang');
    const browserLang = navigator.language.search('pl') > -1 ? 'pl' : 'en';
    window.setLanguage(savedLang || browserLang);
}

// --- PROCEDURALNA TEKSTURA DREWNA ---
function createWoodTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 512, 512);
    ctx.strokeStyle = '#999999';
    ctx.lineWidth = 1;
    for (let i = 0; i < 80; i++) {
        ctx.beginPath();
        let y = i * 8;
        ctx.moveTo(0, y);
        for (let x = 0; x < 512; x += 10) {
            ctx.lineTo(x, y + Math.sin(x * 0.03) * 4 + Math.random() * 2);
        }
        ctx.stroke();
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
}
const woodTexture = createWoodTexture();

function init() {
    // Inicjalizacja języka przed załadowaniem fontów
    initLanguage();

    scene = new THREE.Scene();
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 12);
    controls = new OrbitControls(camera, renderer.domElement);

    // Panele świetlne
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    const pGeom = new THREE.BoxGeometry(30, 30, 1);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const p1 = new THREE.Mesh(pGeom, pMat); p1.position.set(0, 25, 0); p1.rotation.x = Math.PI/2; envScene.add(p1);
    const p2 = new THREE.Mesh(pGeom, pMat); p2.position.set(0, 0, 25); envScene.add(p2);
    scene.environment = pmremGenerator.fromScene(envScene).texture;

    const loader = new FontLoader();
    // Użycie fontu gentilis_bold, który wspiera podstawowe znaki (lub helvetiker z poprzedniej wersji)
    loader.load("https://raw.githubusercontent.com/mrdoob/three.js/master/examples/fonts/gentilis_bold.typeface.json", f => { 
        font = f; loadSettings(); updateExposure(); createText(); 
    });

    ids.forEach(id => document.getElementById(id).addEventListener("input", () => {
        if(id === "exposureInput") updateExposure();
        createText();
    }));

    window.addEventListener("resize", onResize);
    document.getElementById("togglePanel").addEventListener("click", togglePanel);
    document.getElementById("fsBtn").addEventListener("click", toggleFullscreen);
    document.getElementById("resetBtn").addEventListener("click", clearSettings);
    animate();
}

function updateExposure() { renderer.toneMappingExposure = parseFloat(document.getElementById("exposureInput").value); }

function createText() {
    if (!font) return;
    saveSettings();
    const v = (id) => document.getElementById(id).value;
    const matType = v("materialInput");
    
    if (textMesh) { scene.remove(textMesh); textMesh.geometry.dispose(); }

    const geometry = new TextGeometry(v("textInput") || " ", {
        font: font, size: parseFloat(v("sizeInput")), height: parseFloat(v("depthInput")),
        curveSegments: 20, bevelEnabled: true, bevelThickness: 0.12, bevelSize: 0.06, bevelSegments: 10
    });
    geometry.center();

    let matProps = { color: v("colorInput"), metalness: 0.0, roughness: 0.5, envMapIntensity: 1.0, emissive: "#000000" };

    switch(matType) {
        case "custom_metal":
            matProps.metalness = 1.0; matProps.roughness = 0.1; matProps.envMapIntensity = 4.0; break;
        case "chrome":
            matProps.color = "#ffffff"; matProps.metalness = 1.0; matProps.roughness = 0.02; matProps.envMapIntensity = 5.0; break;
        case "gold":
            matProps.color = "#ffcc33"; matProps.metalness = 1.0; matProps.roughness = 0.2; matProps.envMapIntensity = 3.0; break;
        case "wood":
            matProps.map = woodTexture; matProps.roughness = 0.8; break;
        case "neon":
            matProps.emissive = v("colorInput"); matProps.roughness = 1.0; break;
        default: // plastic
            matProps.roughness = 0.1; break;
    }

    textMesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial(matProps));
    scene.add(textMesh);
}

function animate() {
    requestAnimationFrame(animate);
    if (textMesh) textMesh.rotation.y += parseFloat(document.getElementById("speedInput").value);
    controls.update();
    renderer.render(scene, camera);
}

function clearSettings() {
    const keys = ['eventext_v18_settings', 'eventext_v17_settings', 'eventext_v16_settings', 'eventext_pro_settings', 'eventext_lang'];
    keys.forEach(key => localStorage.removeItem(key));
    localStorage.clear(); 

    window.location.href = window.location.pathname + "?reset=" + Date.now();
}

function saveSettings() {
    const settings = {};
    ids.forEach(id => { 
        const el = document.getElementById(id);
        if (el) settings[id] = el.value; 
    });
    localStorage.setItem('eventext_v18_settings', JSON.stringify(settings));
}

function loadSettings() {
    if (window.location.search.includes("reset")) return;

    const saved = localStorage.getItem('eventext_v18_settings');
    if (saved) {
        const settings = JSON.parse(saved);
        ids.forEach(id => { 
            const el = document.getElementById(id);
            if (settings[id] !== undefined && el) {
                el.value = settings[id];
            }
        });
    }
}

function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

function togglePanel() { 
    const p = document.getElementById("panel"); 
    const hidden = p.classList.toggle("hidden"); 
    const currentLang = document.documentElement.lang === 'pl' ? 'pl' : 'en';
    document.getElementById("togglePanel").textContent = hidden ? translations[currentLang]["btn_panel_show"] : translations[currentLang]["btn_panel_hide"]; 
}

function onResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

init();
</script>
</body>
</html>
